<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 번호 추첨기</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #f8fafc;
        --accent: #f59e0b;
        --muted: #94a3b8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 760px);
        background: rgba(17, 24, 39, 0.95);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        border-radius: 24px;
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
        text-align: center;
      }

      .subtitle {
        margin: 0 0 24px;
        text-align: center;
        color: var(--muted);
      }

      .numbers {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin: 24px 0;
      }

      .ball {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 1.2rem;
        color: #111;
        box-shadow: inset 0 -4px 6px rgba(0,0,0,0.15);
      }

      .ball:nth-child(odd) { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
      .ball:nth-child(even) { background: linear-gradient(135deg, #93c5fd, #3b82f6); }

      .controls {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 16px;
      }

      button {
        border: none;
        cursor: pointer;
        padding: 12px 20px;
        border-radius: 999px;
        font-size: 1rem;
        font-weight: 700;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      button:hover { transform: translateY(-2px); }
      button:active { transform: translateY(0); }

      .draw-btn {
        background: var(--accent);
        color: #111;
      }

      .reset-btn {
        background: #334155;
        color: var(--text);
      }

      .history {
        margin-top: 26px;
        padding-top: 18px;
        border-top: 1px solid rgba(255,255,255,0.1);
      }

      .history h2 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      .history-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .history-item {
        background: #1f2937;
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 0.95rem;
        color: #e2e8f0;
      }

      @media (max-width: 600px) {
        .card { padding: 24px; }
        .ball { width: 52px; height: 52px; font-size: 1rem; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>🎲 로또 번호 추첨기</h1>
      <p class="subtitle">오늘의 행운을 뽑아보세요!</p>

      <section class="numbers" id="numbers"></section>

      <div class="controls">
        <button class="draw-btn" id="drawBtn">번호 추첨하기</button>
        <button class="reset-btn" id="resetBtn">초기화</button>
      </div>

      <section class="history">
        <h2>최근 추첨 기록</h2>
        <div class="history-list" id="historyList"></div>
      </section>
    </main>

    <script>
      const numbersEl = document.getElementById("numbers");
      const historyListEl = document.getElementById("historyList");
      const drawBtn = document.getElementById("drawBtn");
      const resetBtn = document.getElementById("resetBtn");

      let history = [];

      function renderNumbers(nums) {
        numbersEl.innerHTML = "";
        nums.forEach((n) => {
          const ball = document.createElement("div");
          ball.className = "ball";
          ball.textContent = n;
          numbersEl.appendChild(ball);
        });
      }

      function renderHistory() {
        if (history.length === 0) {
          historyListEl.innerHTML = '<span class="history-item">아직 추첨된 번호가 없습니다.</span>';
          return;
        }

        historyListEl.innerHTML = history
          .slice(0, 5)
          .map((entry) => `<span class="history-item">${entry.join(", ")}</span>`)
          .join("");
      }

      function drawLotto() {
        const nums = new Set();
        while (nums.size < 6) {
          nums.add(Math.floor(Math.random() * 45) + 1);
        }

        const result = [...nums].sort((a, b) => a - b);
        renderNumbers(result);
        history.unshift(result);
        history = history.slice(0, 5);
        renderHistory();
      }

      drawBtn.addEventListener("click", drawLotto);
      resetBtn.addEventListener("click", () => {
        renderNumbers([]);
        history = [];
        renderHistory();
      });

      drawLotto();
    </script>
  </body>
</html>
